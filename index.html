<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>비사용증후군 학습카드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 16px 40px;
      user-select: none;
    }

    /* 헤더 */
    .header {
      width: 100%;
      max-width: 420px;
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header p {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      margin-top: 4px;
    }

    /* 진행률 */
    .progress-wrap {
      width: 100%;
      max-width: 420px;
      margin-bottom: 20px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      margin-bottom: 6px;
    }
    .progress-bar-bg {
      background: rgba(255,255,255,0.25);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: #fff;
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* 카드 영역 */
    .card-area {
      width: 100%;
      max-width: 420px;
      perspective: 1200px;
      margin-bottom: 28px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      min-height: 300px;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      min-height: 300px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 20px;
      padding: 36px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .card-front {
      background: #fff;
    }
    .card-back {
      background: linear-gradient(135deg, #f5f7fa, #e8ecf0);
      transform: rotateY(180deg);
    }

    .card-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 20px;
    }
    .card-front .card-badge {
      background: #f0edff;
      color: #764ba2;
    }
    .card-back .card-badge {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .card-number {
      font-size: 12px;
      color: #bbb;
      margin-bottom: 12px;
    }

    .card-text {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.6;
      word-break: keep-all;
    }
    .card-back .card-text {
      font-size: 16px;
      font-weight: 500;
      color: #333;
      line-height: 1.8;
    }

    .flip-hint {
      margin-top: 24px;
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .flip-icon { font-size: 16px; }

    /* 버튼 영역 */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 16px;
    }

    .btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-prev {
      background: rgba(255,255,255,0.2);
      color: #fff;
      backdrop-filter: blur(10px);
    }
    .btn-next {
      background: #fff;
      color: #764ba2;
    }

    /* 알았어요/모르겠어요 버튼 */
    .know-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 20px;
    }
    .btn-know {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-know:active { transform: scale(0.96); }
    .btn-yes {
      background: rgba(76, 175, 80, 0.85);
      color: #fff;
    }
    .btn-no {
      background: rgba(244, 67, 54, 0.75);
      color: #fff;
    }

    /* 결과 점수 */
    .score-board {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px 20px;
      display: flex;
      justify-content: space-around;
      backdrop-filter: blur(10px);
    }
    .score-item { text-align: center; }
    .score-item .val {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }
    .score-item .lbl {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }

    /* 완료 화면 */
    .complete-screen {
      display: none;
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 24px;
      padding: 48px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .complete-screen.show { display: block; }
    .complete-emoji { font-size: 60px; margin-bottom: 16px; }
    .complete-title { font-size: 22px; font-weight: 800; color: #1a1a2e; margin-bottom: 8px; }
    .complete-sub { font-size: 14px; color: #888; margin-bottom: 28px; line-height: 1.6; }
    .complete-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 32px;
    }
    .stat { text-align: center; }
    .stat .num { font-size: 28px; font-weight: 800; }
    .stat .lbl { font-size: 12px; color: #999; margin-top: 2px; }
    .stat.green .num { color: #4caf50; }
    .stat.red .num { color: #f44336; }
    .btn-restart {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-restart:active { opacity: 0.85; }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <h1>🏥 비사용증후군</h1>
    <p>카드를 탭하면 정답이 보여요</p>
  </div>

  <!-- 진행률 -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressText">1 / 10</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- 카드 -->
  <div class="card-area" id="cardArea">
    <div class="card-inner" id="cardInner" onclick="flipCard()">
      <div class="card-front">
        <div class="card-badge">Question</div>
        <div class="card-number" id="cardNum">카드 1 / 10</div>
        <div class="card-text" id="questionText"></div>
        <div class="flip-hint"><span class="flip-icon">👆</span> 탭해서 정답 보기</div>
      </div>
      <div class="card-back">
        <div class="card-badge">Answer</div>
        <div class="card-text" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- 알았어요/모르겠어요 -->
  <div class="know-row" id="knowRow" style="display:none;">
    <button class="btn-know btn-no" onclick="markCard(false)">🤔 모르겠어요</button>
    <button class="btn-know btn-yes" onclick="markCard(true)">✅ 알았어요!</button>
  </div>

  <!-- 이전/다음 -->
  <div class="btn-row">
    <button class="btn btn-prev" id="btnPrev" onclick="prevCard()" disabled>← 이전</button>
    <button class="btn btn-next" id="btnNext" onclick="nextCard()">다음 →</button>
  </div>

  <!-- 점수판 -->
  <div class="score-board">
    <div class="score-item">
      <div class="val" id="scoreKnow">0</div>
      <div class="lbl">✅ 알았어요</div>
    </div>
    <div class="score-item">
      <div class="val" id="scoreDont">0</div>
      <div class="lbl">🤔 모르겠어요</div>
    </div>
    <div class="score-item">
      <div class="val" id="scoreLeft">10</div>
      <div class="lbl">📋 남은 카드</div>
    </div>
  </div>

  <!-- 완료 화면 -->
  <div class="complete-screen" id="completeScreen">
    <div class="complete-emoji" id="completeEmoji">🎉</div>
    <div class="complete-title" id="completeTitle">학습 완료!</div>
    <div class="complete-sub" id="completeSub"></div>
    <div class="complete-stats">
      <div class="stat green">
        <div class="num" id="finalKnow">0</div>
        <div class="lbl">알았어요</div>
      </div>
      <div class="stat red">
        <div class="num" id="finalDont">0</div>
        <div class="lbl">모르겠어요</div>
      </div>
    </div>
    <button class="btn-restart" onclick="restart()">🔄 다시 학습하기</button>
  </div>

<script>
const cards = [
  {
    q: "비사용증후군(Disuse Syndrome)이란 무엇인가?",
    a: "신체를 장기간 사용하지 않거나 활동량이 극도로 줄어들었을 때 나타나는 신체적·기능적 저하 현상의 총칭"
  },
  {
    q: "비사용증후군의 주요 발생 원인 3가지는?",
    a: "① 장기 입원·침상 안정\n② 마비·골절로 인한 부동 상태\n③ 극도로 낮은 활동량 지속"
  },
  {
    q: "비사용증후군에서 근골격계에 나타나는 변화는?",
    a: "근위축, 근력 저하, 골다공증, 관절 구축(contracture)"
  },
  {
    q: "침상 안정 시 하루에 근력이 약 몇 % 감소할 수 있는가?",
    a: "하루 약 1~3% 감소\n(1주일이면 최대 20% 이상 저하 가능)"
  },
  {
    q: "비사용증후군에서 심폐계에 나타나는 합병증 2가지는?",
    a: "① 기립성 저혈압\n② 심부정맥혈전증(DVT) / 폐색전증 위험 증가"
  },
  {
    q: "비사용증후군으로 인한 피부 합병증은?\n주로 어느 부위에 발생하는가?",
    a: "욕창(압박궤양)\n주로 천골부, 발뒤꿈치, 후두부 등\n뼈 돌출 부위에 발생"
  },
  {
    q: "비사용증후군의 정신·인지적 증상 3가지는?",
    a: "① 우울감\n② 인지 기능 저하\n③ 무기력·의욕 저하"
  },
  {
    q: "비사용증후군 예방의 핵심 원칙은?",
    a: "조기 이상(Early Mobilization)\n— 가능한 한 빨리 침상에서 일어나 활동을 시작하는 것"
  },
  {
    q: "욕창 예방을 위해 체위 변경은 최소 몇 시간마다 해야 하는가?",
    a: "최소 2시간마다 체위 변경 권장"
  },
  {
    q: "비사용증후군은 주로 어느 의학 분야에서 다루며,\n간호 진단 시 어떤 용어를 사용하는가?",
    a: "주로 재활의학 / 노인의학에서 다루며\n간호 진단: '신체 기동성 장애',\n'활동 지속성 장애' 등"
  }
];

let current = 0;
let flipped = false;
let results = new Array(cards.length).fill(null); // null=미답, true=알아요, false=몰라요
let knowCount = 0;
let dontCount = 0;

// 스와이프
let startX = 0;
const cardArea = document.getElementById('cardArea');
cardArea.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
cardArea.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - startX;
  if (Math.abs(dx) > 60) { dx < 0 ? nextCard() : prevCard(); }
});

function render() {
  const card = cards[current];
  document.getElementById('questionText').innerText = card.q;
  document.getElementById('answerText').innerText = card.a;
  document.getElementById('cardNum').innerText = `카드 ${current + 1} / ${cards.length}`;

  // 뒤집기 초기화
  const inner = document.getElementById('cardInner');
  inner.classList.remove('flipped');
  flipped = false;
  document.getElementById('knowRow').style.display = 'none';

  // 진행률
  const answered = results.filter(r => r !== null).length;
  const pct = Math.round((answered / cards.length) * 100);
  document.getElementById('progressText').innerText = `${answered} / ${cards.length} 완료`;
  document.getElementById('progressPct').innerText = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  // 버튼
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').innerText = current === cards.length - 1 ? '결과 보기' : '다음 →';

  // 점수판
  document.getElementById('scoreKnow').innerText = knowCount;
  document.getElementById('scoreDont').innerText = dontCount;
  document.getElementById('scoreLeft').innerText = cards.length - answered;
}

function flipCard() {
  const inner = document.getElementById('cardInner');
  flipped = !flipped;
  inner.classList.toggle('flipped', flipped);
  if (flipped) {
    setTimeout(() => {
      document.getElementById('knowRow').style.display = 'flex';
    }, 300);
  } else {
    document.getElementById('knowRow').style.display = 'none';
  }
}

function markCard(knew) {
  if (results[current] === null) {
    if (knew) knowCount++;
    else dontCount++;
  } else {
    // 재선택 시 이전 값 제거
    if (results[current] === true) knowCount--;
    else dontCount--;
    if (knew) knowCount++;
    else dontCount++;
  }
  results[current] = knew;
  render();
  // 자동으로 다음 카드
  setTimeout(() => {
    if (current < cards.length - 1) { current++; render(); }
    else { showComplete(); }
  }, 350);
}

function nextCard() {
  if (current < cards.length - 1) { current++; render(); }
  else { showComplete(); }
}

function prevCard() {
  if (current > 0) { current--; render(); }
}

function showComplete() {
  document.getElementById('cardArea').style.display = 'none';
  document.querySelector('.progress-wrap').style.display = 'none';
  document.querySelector('.btn-row').style.display = 'none';
  document.querySelector('.know-row').style.display = 'none';
  document.querySelector('.score-board').style.display = 'none';

  const pct = Math.round((knowCount / cards.length) * 100);
  document.getElementById('finalKnow').innerText = knowCount;
  document.getElementById('finalDont').innerText = dontCount;

  let emoji = '🎉', title = '완벽해요!', sub = '모든 카드를 완벽하게 학습했어요!';
  if (pct < 50) { emoji = '📚'; title = '조금 더 연습해요!'; sub = `${pct}% 정답! 틀린 카드를 다시 복습해 보세요.`; }
  else if (pct < 80) { emoji = '👍'; title = '잘 하고 있어요!'; sub = `${pct}% 정답! 조금만 더 하면 완벽해요.`; }
  else { sub = `${pct}% 정답! 비사용증후군 전문가네요.`; }

  document.getElementById('completeEmoji').innerText = emoji;
  document.getElementById('completeTitle').innerText = title;
  document.getElementById('completeSub').innerText = sub;
  document.getElementById('completeScreen').classList.add('show');
}

function restart() {
  current = 0;
  flipped = false;
  results = new Array(cards.length).fill(null);
  knowCount = 0;
  dontCount = 0;

  document.getElementById('completeScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = 'block';
  document.querySelector('.progress-wrap').style.display = 'block';
  document.querySelector('.btn-row').style.display = 'flex';
  document.querySelector('.score-board').style.display = 'flex';
  render();
}

// 초기 렌더
render();
</script>
</body>
</html>
