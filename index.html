<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>비사용증후군 학습 | 인덕의료재단</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 48px;
    }

    /* 로고/타이틀 */
    .top {
      text-align: center;
      margin-bottom: 48px;
    }
    .hospital-name {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .main-icon {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
    }
    .main-title {
      font-size: 26px;
      font-weight: 900;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .main-title span {
      color: #38ef7d;
    }
    .main-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
    }

    /* 메뉴 카드 */
    .menu-wrap {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .menu-card {
      width: 100%;
      border: none;
      border-radius: 20px;
      padding: 26px 24px;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: transform 0.15s, box-shadow 0.15s;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    .menu-card:active { transform: scale(0.97); }

    .menu-card.flash {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .menu-card.quiz {
      background: linear-gradient(135deg, #11998e, #38ef7d);
    }
    .menu-card.ranking {
      background: linear-gradient(135deg, #f9a825, #ff6f00);
    }
    .menu-card.summary {
      background: linear-gradient(135deg, #4776e6, #8e54e9);
    }

    .menu-icon {
      font-size: 40px;
      min-width: 52px;
      text-align: center;
    }
    .menu-text {}
    .menu-title {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
    }
    .menu-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
    }
    .menu-arrow {
      margin-left: auto;
      font-size: 20px;
      color: rgba(255,255,255,0.6);
    }

    /* 카카오 공유 버튼 */
    .btn-kakao-share {
      width: 100%; max-width: 400px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 16px; margin-bottom: 16px;
      background: #fee500; color: #3a1d1d;
      font-size: 15px; font-weight: 900;
      border-radius: 16px; border: none; cursor: pointer;
      box-shadow: 0 4px 16px rgba(254,229,0,0.3);
    }
    .btn-kakao-share:active { opacity: 0.85; transform: scale(0.98); }

    /* 관리자 링크 */
    .admin-link {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 99px;
      transition: color 0.2s, border-color 0.2s;
    }
    .admin-link:hover { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.3); }

    /* 뱃지 */
    .badge-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="hospital-name">인덕의료재단</div>
    <span class="main-icon">🏥</span>
    <div class="main-title">비사용증후군<br><span>직원 학습 센터</span></div>
    <div class="main-sub">학습하고 싶은 방식을 선택하세요</div>
  </div>

  <div class="menu-wrap">

    <!-- 학습 카드 -->
    <a class="menu-card flash" href="flashcard.html">
      <div class="menu-icon">🃏</div>
      <div class="menu-text">
        <div class="menu-title">학습 카드</div>
        <div class="menu-desc">카드를 탭해서 내용을 익혀요<br>알았어요 / 모르겠어요로 복습</div>
        <div class="badge-row">
          <span class="badge">10장</span>
          <span class="badge">플래시카드</span>
        </div>
      </div>
      <div class="menu-arrow">›</div>
    </a>

    <!-- 퀴즈 -->
    <a class="menu-card quiz" href="quiz.html">
      <div class="menu-icon">📝</div>
      <div class="menu-text">
        <div class="menu-title">4지선다 퀴즈</div>
        <div class="menu-desc">학습 후 실력을 확인해 보세요<br>기초·심화 선택 / 수료증 발급</div>
        <div class="badge-row">
          <span class="badge">기초+심화</span>
          <span class="badge">수료증</span>
        </div>
      </div>
      <div class="menu-arrow">›</div>
    </a>

    <!-- 핵심 요약 -->
    <a class="menu-card summary" href="summary.html">
      <div class="menu-icon">📋</div>
      <div class="menu-text">
        <div class="menu-title">핵심 요약</div>
        <div class="menu-desc">가족·지인에게 설명할 때 쓰는<br>비사용증후군 핵심 내용 정리</div>
        <div class="badge-row">
          <span class="badge">설명 스크립트</span>
          <span class="badge">전화번호</span>
        </div>
      </div>
      <div class="menu-arrow">›</div>
    </a>

    <!-- 랭킹 -->
    <a class="menu-card ranking" href="ranking.html">
      <div class="menu-icon">🏆</div>
      <div class="menu-text">
        <div class="menu-title">부서별 랭킹</div>
        <div class="menu-desc">우리 부서 평균은 몇 점일까요?<br>전체 참여자 순위를 확인하세요</div>
        <div class="badge-row">
          <span class="badge">부서랭킹</span>
          <span class="badge">개인TOP10</span>
        </div>
      </div>
      <div class="menu-arrow">›</div>
    </a>

  </div>

  <button class="btn-kakao-share" onclick="shareKakao()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="#3a1d1d"><path d="M12 2C6.477 2 2 5.813 2 10.5c0 2.943 1.696 5.54 4.28 7.147L5.25 21.5l4.563-2.26C10.54 19.41 11.26 19.5 12 19.5c5.523 0 10-3.813 10-8.5S17.523 2 12 2z"/></svg>
    카카오톡으로 공유하기
  </button>

  <a class="admin-link" href="admin.html">관리자 대시보드 →</a>

<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
<script>
Kakao.init('d24677d166ecd885a80091fbc35e9266');

const SHARE_URL = 'https://sjh3568-cpu.github.io/disuse-syndrome/summary.html';

function shareKakao() {
  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: '비사용증후군 핵심 요약 | 인덕의료재단',
      description: '수술·입원 후 재활이 필요한 분께 꼭 알려주세요. 복주회복병원 054-851-5070',
      imageUrl: 'https://sjh3568-cpu.github.io/disuse-syndrome/og-image.png',
      link: { mobileWebUrl: SHARE_URL, webUrl: SHARE_URL }
    },
    buttons: [
      {
        title: '핵심 요약 보기',
        link: { mobileWebUrl: SHARE_URL, webUrl: SHARE_URL }
      }
    ]
  });
}
</script>
</body>
</html>
