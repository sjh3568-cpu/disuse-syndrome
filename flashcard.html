<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>비사용증후군 직원 학습퀴즈 | 복주회복병원</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 16px 40px;
      user-select: none;
    }

    /* 헤더 */
    .header {
      width: 100%;
      max-width: 420px;
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header p {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      margin-top: 4px;
    }

    /* 진행률 */
    .progress-wrap {
      width: 100%;
      max-width: 420px;
      margin-bottom: 20px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      margin-bottom: 6px;
    }
    .progress-bar-bg {
      background: rgba(255,255,255,0.25);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: #fff;
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* 카드 영역 */
    .card-area {
      width: 100%;
      max-width: 420px;
      perspective: 1200px;
      margin-bottom: 28px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      min-height: 300px;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      min-height: 300px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 20px;
      padding: 36px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .card-front {
      background: #fff;
    }
    .card-back {
      background: linear-gradient(135deg, #f5f7fa, #e8ecf0);
      transform: rotateY(180deg);
    }

    .card-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 20px;
    }
    .card-front .card-badge {
      background: #f0edff;
      color: #764ba2;
    }
    .card-back .card-badge {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .card-number {
      font-size: 12px;
      color: #bbb;
      margin-bottom: 12px;
    }

    .card-text {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.6;
      word-break: keep-all;
    }
    .card-back .card-text {
      font-size: 16px;
      font-weight: 500;
      color: #333;
      line-height: 1.8;
    }

    .flip-hint {
      margin-top: 24px;
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .flip-icon { font-size: 16px; }

    /* 버튼 영역 */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 16px;
    }

    .btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-prev {
      background: rgba(255,255,255,0.2);
      color: #fff;
      backdrop-filter: blur(10px);
    }
    .btn-next {
      background: #fff;
      color: #764ba2;
    }

    /* 알았어요/모르겠어요 버튼 */
    .know-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 20px;
    }
    .btn-know {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-know:active { transform: scale(0.96); }
    .btn-yes {
      background: rgba(76, 175, 80, 0.85);
      color: #fff;
    }
    .btn-no {
      background: rgba(244, 67, 54, 0.75);
      color: #fff;
    }

    /* 결과 점수 */
    .score-board {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px 20px;
      display: flex;
      justify-content: space-around;
      backdrop-filter: blur(10px);
    }
    .score-item { text-align: center; }
    .score-item .val {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }
    .score-item .lbl {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }

    /* 완료 화면 */
    .complete-screen {
      display: none;
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 24px;
      padding: 48px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .complete-screen.show { display: block; }
    .complete-emoji { font-size: 60px; margin-bottom: 16px; }
    .complete-title { font-size: 22px; font-weight: 800; color: #1a1a2e; margin-bottom: 8px; }
    .complete-sub { font-size: 14px; color: #888; margin-bottom: 28px; line-height: 1.6; }
    .complete-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 32px;
    }
    .stat { text-align: center; }
    .stat .num { font-size: 28px; font-weight: 800; }
    .stat .lbl { font-size: 12px; color: #999; margin-top: 2px; }
    .stat.green .num { color: #4caf50; }
    .stat.red .num { color: #f44336; }
    .btn-restart {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-restart:active { opacity: 0.85; }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <h1>🏥 비사용증후군</h1>
    <p>카드를 탭하면 정답이 보여요</p>
  </div>

  <!-- 진행률 -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressText">1 / 10</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- 카드 -->
  <div class="card-area" id="cardArea">
    <div class="card-inner" id="cardInner" onclick="flipCard()">
      <div class="card-front">
        <div class="card-badge">Question</div>
        <div class="card-number" id="cardNum">카드 1 / 10</div>
        <div class="card-text" id="questionText"></div>
        <div class="flip-hint"><span class="flip-icon">👆</span> 탭해서 정답 보기</div>
      </div>
      <div class="card-back">
        <div class="card-badge">Answer</div>
        <div class="card-text" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- 알았어요/모르겠어요 -->
  <div class="know-row" id="knowRow" style="display:none;">
    <button class="btn-know btn-no" onclick="markCard(false)">🤔 모르겠어요</button>
    <button class="btn-know btn-yes" onclick="markCard(true)">✅ 알았어요!</button>
  </div>

  <!-- 이전/다음 -->
  <div class="btn-row">
    <button class="btn btn-prev" id="btnPrev" onclick="prevCard()" disabled>← 이전</button>
    <button class="btn btn-next" id="btnNext" onclick="nextCard()">다음 →</button>
  </div>

  <!-- 점수판 -->
  <div class="score-board">
    <div class="score-item">
      <div class="val" id="scoreKnow">0</div>
      <div class="lbl">✅ 알았어요</div>
    </div>
    <div class="score-item">
      <div class="val" id="scoreDont">0</div>
      <div class="lbl">🤔 모르겠어요</div>
    </div>
    <div class="score-item">
      <div class="val" id="scoreLeft">10</div>
      <div class="lbl">📋 남은 카드</div>
    </div>
  </div>

  <!-- 완료 화면 -->
  <div class="complete-screen" id="completeScreen">
    <div class="complete-emoji" id="completeEmoji">🎉</div>
    <div class="complete-title" id="completeTitle">학습 완료!</div>
    <div class="complete-sub" id="completeSub"></div>
    <div class="complete-stats">
      <div class="stat green">
        <div class="num" id="finalKnow">0</div>
        <div class="lbl">알았어요</div>
      </div>
      <div class="stat red">
        <div class="num" id="finalDont">0</div>
        <div class="lbl">모르겠어요</div>
      </div>
    </div>
    <button class="btn-restart" onclick="restart()">🔄 다시 학습하기</button>
  </div>

<script>
const cards = [
  {
    q: "비사용증후군(Disuse Syndrome)이란?\n쉽게 설명해 보세요.",
    a: "급성질환이나 수술 후 신체를 사용하지 못해\n근력 저하, 균형감각 저하, 일상생활 능력 저하 등\n신체 기능이 전반적으로 떨어지는 상태"
  },
  {
    q: "비사용증후군 해당 사례 3가지는?",
    a: "① 내과적 시술·폐렴·심장질환 치료 후\n   장기입원으로 근력 저하된 경우\n② 탈장·맹장 등 외과수술 후\n   근력·균형감각이 떨어진 경우\n③ 항암·방사선·면역요법 후\n   근력 저하로 일상생활 어려운 경우"
  },
  {
    q: "비사용증후군 대상 환자를\n한 문장으로 설명하면?",
    a: "종합병원 중환자실에 입원하셨거나,\n수술 후 신체 기능이 떨어지신\n모든 환자가 대상이 될 수 있습니다."
  },
  {
    q: "비사용증후군 환자에게\n나타나는 주요 증상 4가지는?",
    a: "① 근력이 떨어져 거동이 불편하다\n② 급격한 신체 변화가 있다\n③ 스스로 일상생활을 할 수 없다\n④ 균형감각이 떨어져 낙상 위험이 있다"
  },
  {
    q: "비사용증후군 환자가\n집으로 바로 퇴원하기 어려운 이유는?",
    a: "수술·급성질환 후 아래 문제가 남아 있기 때문입니다:\n• 혼자 움직이려면 누군가의 도움이 필요\n• 근력 저하로 일상생활 동작 어려움\n• 균형감각 저하로 넘어질 위험\n→ 전문 재활치료가 필요한 상태"
  },
  {
    q: "비사용증후군 환자에게\n제공되는 맞춤형 재활치료란?",
    a: "환자 개인의 상태에 따라\n필요한 재활치료를 맞춤으로 제공\n• 근력 회복 운동\n• 균형감각 훈련\n• 일상생활동작(ADL) 훈련\n• 도수치료 등"
  },
  {
    q: "비사용증후군 환자의\n건강보험 입원 가능 기간은?",
    a: "발병 또는 수술 후 60일 이내 입원 시\n→ 입원일로부터 최대 60일까지 입원 가능"
  },
  {
    q: "비사용증후군으로 입원 시\n건강보험이 적용되는 치료는?",
    a: "재활치료, 도수치료\n모두 건강보험 적용 가능"
  },
  {
    q: "간호간병통합서비스란 무엇이며\n환자에게 어떤 혜택이 있나요?",
    a: "병원 간호인력이 간병까지 통합 제공하는 서비스\n→ 건강보험 적용으로 간병비 부담 크게 감소"
  },
  {
    q: "종합병원 수술 후 신체 기능이 떨어진\n비사용증후군 환자의\n재활은 어디서 받아야 하나요?",
    a: "보건복지부 지정 재활의료기관\n(재활전문병원)에서 받아야 합니다.\n✅ 안동 복주회복병원이 해당됩니다!\n(요양병원 혜택 적용 X)\n📞 문의: 054-851-5070 / 5081"
  }
];

let current = 0;
let flipped = false;
let results = new Array(cards.length).fill(null); // null=미답, true=알아요, false=몰라요
let knowCount = 0;
let dontCount = 0;

// 스와이프
let startX = 0;
const cardArea = document.getElementById('cardArea');
cardArea.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
cardArea.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - startX;
  if (Math.abs(dx) > 60) { dx < 0 ? nextCard() : prevCard(); }
});

function render() {
  const card = cards[current];
  document.getElementById('questionText').innerText = card.q;
  document.getElementById('answerText').innerText = card.a;
  document.getElementById('cardNum').innerText = `카드 ${current + 1} / ${cards.length}`;

  // 뒤집기 초기화
  const inner = document.getElementById('cardInner');
  inner.classList.remove('flipped');
  flipped = false;
  document.getElementById('knowRow').style.display = 'none';

  // 진행률
  const answered = results.filter(r => r !== null).length;
  const pct = Math.round((answered / cards.length) * 100);
  document.getElementById('progressText').innerText = `${answered} / ${cards.length} 완료`;
  document.getElementById('progressPct').innerText = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  // 버튼
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').innerText = current === cards.length - 1 ? '결과 보기' : '다음 →';

  // 점수판
  document.getElementById('scoreKnow').innerText = knowCount;
  document.getElementById('scoreDont').innerText = dontCount;
  document.getElementById('scoreLeft').innerText = cards.length - answered;
}

function flipCard() {
  const inner = document.getElementById('cardInner');
  flipped = !flipped;
  inner.classList.toggle('flipped', flipped);
  if (flipped) {
    setTimeout(() => {
      document.getElementById('knowRow').style.display = 'flex';
    }, 300);
  } else {
    document.getElementById('knowRow').style.display = 'none';
  }
}

function markCard(knew) {
  if (results[current] === null) {
    if (knew) knowCount++;
    else dontCount++;
  } else {
    // 재선택 시 이전 값 제거
    if (results[current] === true) knowCount--;
    else dontCount--;
    if (knew) knowCount++;
    else dontCount++;
  }
  results[current] = knew;
  render();
  // 자동으로 다음 카드
  setTimeout(() => {
    if (current < cards.length - 1) { current++; render(); }
    else { showComplete(); }
  }, 350);
}

function nextCard() {
  if (current < cards.length - 1) { current++; render(); }
  else { showComplete(); }
}

function prevCard() {
  if (current > 0) { current--; render(); }
}

function showComplete() {
  document.getElementById('cardArea').style.display = 'none';
  document.querySelector('.progress-wrap').style.display = 'none';
  document.querySelector('.btn-row').style.display = 'none';
  document.querySelector('.know-row').style.display = 'none';
  document.querySelector('.score-board').style.display = 'none';

  const pct = Math.round((knowCount / cards.length) * 100);
  document.getElementById('finalKnow').innerText = knowCount;
  document.getElementById('finalDont').innerText = dontCount;

  let emoji = '🎉', title = '완벽해요!', sub = '모든 카드를 완벽하게 학습했어요!';
  if (pct < 50) { emoji = '📚'; title = '조금 더 연습해요!'; sub = `${pct}% 정답! 틀린 카드를 다시 복습해 보세요.`; }
  else if (pct < 80) { emoji = '👍'; title = '잘 하고 있어요!'; sub = `${pct}% 정답! 조금만 더 하면 완벽해요.`; }
  else { sub = `${pct}% 정답! 비사용증후군 전문가네요.`; }

  document.getElementById('completeEmoji').innerText = emoji;
  document.getElementById('completeTitle').innerText = title;
  document.getElementById('completeSub').innerText = sub;
  document.getElementById('completeScreen').classList.add('show');
}

function restart() {
  current = 0;
  flipped = false;
  results = new Array(cards.length).fill(null);
  knowCount = 0;
  dontCount = 0;

  document.getElementById('completeScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = 'block';
  document.querySelector('.progress-wrap').style.display = 'block';
  document.querySelector('.btn-row').style.display = 'flex';
  document.querySelector('.score-board').style.display = 'flex';
  render();
}

// 초기 렌더
render();
</script>
</body>
</html>
